<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Hamid Shafiq</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080b0f; --blue: #0078d4; --green: #39ff14;
    --text: #c9d1d9; --muted: #6e7681;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .container { max-width: 520px; }
  .error-code {
    font-family: var(--mono);
    font-size: clamp(80px, 20vw, 140px);
    color: var(--blue);
    line-height: 1;
    opacity: 0.15;
    margin-bottom: -20px;
    display: block;
  }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
  p { font-family: var(--mono); font-size: 14px; color: var(--muted); margin-bottom: 40px; line-height: 1.8; }
  p span { color: var(--green); }
  a {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
    padding: 12px 28px;
    border: 1px solid var(--blue);
    color: var(--blue);
    text-decoration: none;
    transition: all 0.2s;
    display: inline-block;
  }
  a:hover { background: var(--blue); color: var(--bg); }
</style>
</head>
<body>
  <div class="container">
    <span class="error-code">404</span>
    <h1>Page Not Found</h1>
    <p>
      The path you requested does not exist.<br>
      <span>$ cd ~</span> — returning to base.
    </p>
    <a href="/">← Return Home</a>
  </div>
</body>
</html>
